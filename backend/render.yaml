services:
  - type: web
    name: hemsolutions-api
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hemsolutions-db
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: FRONTEND_URL
        value: https://www.hemsolutions.se
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: SMTP_HOST
        value: send.one.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        value: info@hemsolutions.se
      - key: EMAIL_FROM
        value: info@hemsolutions.se
      - key: EMAIL_FROM_NAME
        value: "HemSolutions Sverige AB"
      - key: ADMIN_EMAIL
        value: info@hemsolutions.se
      - key: SMS_PROVIDER
        value: 46elks
      - key: SMS_FROM
        value: HemSolutions
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: BANKID_ENABLED
        value: "false"
      - key: SWISH_ENABLED
        value: "false"
      - key: LOG_LEVEL
        value: info
    healthCheckPath: /api/health
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1

databases:
  - name: hemsolutions-db
    plan: starter
    databaseName: hemsolutions
    user: hemsolutions